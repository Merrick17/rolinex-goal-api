# Render Blueprint — Merrick17/rolinex-goal-api
# Dashboard → New → Blueprint → connect repo (recommended).

databases:
  - name: prolinex-db
    plan: free
    databaseName: prolinex
    user: prolinex
    region: frankfurt

services:
  - type: web
    name: prolinex-goal-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run build
    preDeployCommand: sh scripts/render-migrate.sh
    startCommand: node dist/src/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOY_PROFILE
        value: public-test
      - key: DATABASE_URL
        fromDatabase:
          name: prolinex-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: prolinex-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: GAME_ENGINE_ENABLED
        value: "true"
      - key: PAYMENT_SIMULATION_INSTANT
        value: "true"
      - key: CORS_ORIGIN
        value: https://prolinexgoal.vercel.app
      - key: SENTINELGATE_SUCCESS_URL
        value: https://prolinexgoal.vercel.app/wallet/deposit/success
      - key: SENTINELGATE_CANCEL_URL
        value: https://prolinexgoal.vercel.app/wallet/deposit/cancel
      - key: ENABLE_SWAGGER
        value: "false"
