# Render Blueprint — Merrick17/rolinex-goal-api
# Supports Docker (default on Render) or Node — pick one block below.

databases:
  - name: prolinex-db
    plan: free
    databaseName: prolinex
    user: prolinex
    region: frankfurt

services:
  # Docker (matches Render "Docker" runtime — needs ./Dockerfile at repo root)
  - type: web
    name: prolinex-goal-api
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEPLOY_PROFILE
        value: public-test
      - key: DEMO_HARDCODED
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: GAME_ENGINE_ENABLED
        value: "true"
      - key: PAYMENT_SIMULATION_INSTANT
        value: "true"
      - key: CORS_ORIGIN
        value: https://prolinexgoal.vercel.app
      - key: SENTINELGATE_SUCCESS_URL
        value: https://prolinexgoal.vercel.app/wallet/deposit/success
      - key: SENTINELGATE_CANCEL_URL
        value: https://prolinexgoal.vercel.app/wallet/deposit/cancel
      - key: ENABLE_SWAGGER
        value: "false"
